<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> input-remove-data-buttons  </title>
</head>
<body>
    <h1> Task (DOM & Events) </h1>
    
  

    <script> 
    // --- Initial Setup ---

let taskList = [];

const main = document.createElement('main');
const section = document.createElement('section');
const box = document.createElement('div');
const input = document.createElement('input');
const btn = document.createElement('button');
const removeBtn = document.createElement('button'); // New Remove Button
const list = document.createElement('ul');

document.body.appendChild(main);
main.appendChild(section);
section.appendChild(box);
box.append(input, btn, removeBtn); // Add both buttons to the box
section.appendChild(list);

// --- Styling ---
main.style.height = '100dvh';
main.style.display = 'flex';
main.style.justifyContent = 'center';
main.style.alignItems = 'center';
main.style.fontFamily = 'sans-serif';

section.style.width = '350px';
section.style.minHeight = '400px';
section.style.background = '#2563eb'; // A nicer blue
section.style.padding = '20px';
section.style.borderRadius = '12px';

box.style.display = "flex";
box.style.gap = '10px';
box.style.marginBottom = '20px';

btn.textContent = 'Save';
removeBtn.textContent = 'Remove Selected';
removeBtn.style.backgroundColor = '#ef4444'; // Red for delete
removeBtn.style.color = 'white';
removeBtn.style.border = 'none';
removeBtn.style.cursor = 'pointer';

input.placeholder = "Enter a Task";
input.style.flex = '1';

list.style.listStyle = 'none';
list.style.padding = '0';

// --- Logic ---

const renderListElement = () => {
    list.innerHTML = ""; 

    taskList.forEach((task, index) => {
        const listItem = document.createElement('li');
        listItem.style.display = 'flex';
        listItem.style.alignItems = 'center';
        listItem.style.gap = '10px';
        listItem.style.color = 'white';
        listItem.style.marginBottom = '10px';

        // 1. Create Checkbox
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = task.selected;
        
        // Update the "selected" status when clicked
        checkbox.addEventListener('change', () => {
            taskList[index].selected = checkbox.checked;
        });

        // 2. Create Text Label
        const span = document.createElement('span');
        span.textContent = task.text;

        listItem.append(checkbox, span);
        list.appendChild(listItem);
    });
};

const addTask = () => {
    const itemText = input.value.trim();
    
    if (itemText !== "") {
        // Store as an object so we can track the checkbox state
        taskList.push({ text: itemText, selected: false });
        input.value = "";
        renderListElement();
    }
};

const removeSelected = () => {
    // Keep only the tasks where "selected" is false
    taskList = taskList.filter(task => !task.selected);
    renderListElement();
};

const handleKeyboard = (e) => {
    if (e.key === "Enter") addTask();
};

// --- Event Listeners ---
btn.addEventListener('click', addTask);
removeBtn.addEventListener('click', removeSelected);
input.addEventListener('keydown', handleKeyboard);
    
    </script>
</body>
</html>
