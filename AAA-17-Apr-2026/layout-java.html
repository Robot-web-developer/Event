<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>  Layout Javascript </title>
</head>
<body>
    

<script> 
    const app = {
    init: () => {
        const root = document.body; // Or a specific div like #app
        root.innerHTML = `
            <header id="main-header">
                <h1>JS Generated Layout</h1>
            </header>
            
            <div style="display: flex; flex: 1;">
                <aside id="main-sidebar">
                    <nav>
                        <ul>
                            <li><a href="#">Home</a></li>
                            <li><a href="#">About</a></li>
                        </ul>
                    </nav>
                </aside>

                <main id="main-content">
                    <h2>Content Loaded via JS</h2>
                    <p>This entire structure was built using a script.</p>
                </main>
            </div>

            <footer id="main-footer">
                <p>&copy; 2026 Scripted Layout Inc.</p>
            </footer>
        `;
        
        // Add basic styles directly via JS for the layout to work
        app.addStyles();
    },

    addStyles: () => {
        const style = document.createElement('style');
        style.textContent = `
            body { display: flex; flex-direction: column; min-height: 100vh; margin: 0; font-family: sans-serif; }
            header, footer { background: #2c3e50; color: white; padding: 1rem; text-align: center; }
            aside { width: 200px; background: #ecf0f1; padding: 1rem; border-right: 1px solid #ddd; }
            main { flex: 1; padding: 2rem; }
        `;
        document.head.appendChild(style);
    }
};

app.init();

</script>
</body>
</html>
